title: "[Workflow]: "
labels: ["workflow"]
body:
  - type: markdown
    attributes:
      value: |
        Tell us about the workflow you are trying to build.
        You do not need to propose an API -- just describe the problem and the
        shape of the data flow. We will figure out the right API together.

  - type: textarea
    id: goal
    attributes:
      label: What are you trying to build?
      description: Describe the overall goal or system this workflow is part of.
    validations:
      required: true

  - type: textarea
    id: data-origin
    attributes:
      label: Where does the data originate?
      description: |
        For example: uploaded by a user, generated by a pipeline, read from a
        database, streamed from an API, etc.
    validations:
      required: true

  - type: textarea
    id: data-destination
    attributes:
      label: Where should the data go?
      description: |
        For example: written to S3, served to a browser, archived to cold
        storage, processed by another service, etc.
    validations:
      required: true

  - type: textarea
    id: volume
    attributes:
      label: What volume and file sizes are involved?
      description: |
        Rough numbers are fine. Examples: "a few hundred 10 KB JSON files per
        day" or "10 GB Parquet files, dozens per hour."
      placeholder: Number of files, typical sizes, frequency
    validations:
      required: false

  - type: dropdown
    id: pattern
    attributes:
      label: Is the workflow streaming, buffered, or both?
      options:
        - Streaming
        - Buffered
        - Both
        - Not sure
    validations:
      required: true

  - type: dropdown
    id: provider
    attributes:
      label: Which provider is involved?
      options:
        - Local
        - Memory
        - Azure ADLS
        - Azure Blob
        - S3
        - GCS
        - Multiple
        - Other / not yet supported
    validations:
      required: true

  - type: textarea
    id: pain
    attributes:
      label: What is awkward or impossible today?
      description: |
        Describe what you tried, what did not work, or what required too many
        steps. If you have not tried yet, describe what you expect to be hard.
    validations:
      required: true

  - type: textarea
    id: ideal
    attributes:
      label: What behavior would make this workflow feel natural?
      description: |
        Describe the experience you wish you had -- in plain language, not
        necessarily as an API signature.
    validations:
      required: true

  - type: textarea
    id: code
    attributes:
      label: Current approach (optional)
      description: |
        If you have code showing how you handle this today (with or without
        Storix), paste it here. This helps us understand the starting point.
      render: python
    validations:
      required: false
