{% extends "base.html" %}

{% block extrahead %}
  {{ super() }}
  {% if page.meta and page.meta.social_preview %}
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Storix">
    <meta property="og:title" content="Storix - Storage for Unix lovers.">
    <meta property="og:description" content="One unix-flavored filesystem API over local disk, memory, and Azure Data Lake. Sync and async, sandboxable, fully typed.">
    <meta property="og:url" content="{{ page.canonical_url }}">
    <meta property="og:image" content="https://storix.mghalix.com/assets/social-preview.png">
    <meta property="og:image:secure_url" content="https://storix.mghalix.com/assets/social-preview.png">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="1456">
    <meta property="og:image:height" content="720">
    <meta property="og:image:alt" content="Storix - Storage for Unix lovers.">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Storix - Storage for Unix lovers.">
    <meta name="twitter:description" content="One unix-flavored filesystem API over local disk, memory, and Azure Data Lake. Sync and async, sandboxable, fully typed.">
    <meta name="twitter:image" content="https://storix.mghalix.com/assets/social-preview.png">
    <meta name="twitter:image:alt" content="Storix - Storage for Unix lovers.">
  {% endif %}
{% endblock %}
