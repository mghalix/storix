# Nerd Font icon and color table for sx listings.
# Glyphs are \uXXXX escapes into Nerd Font codepoints (the set eza and
# nvim-web-devicons use); they need a Nerd-Font-patched terminal font.
# Harvested from eza --icons=always; colors are sx category styles.
# Lookup order: exact [name] match, then [ext], then the [file] default.

[dir]
# the open/closed box metaphor: an OPEN folder when empty (you can see in,
# nothing there, rmdir if you like) and a CLOSED folder when it holds
# something worth a cd. Same color for both - the open glyph alone carries
# "empty". Contents-unknown falls back to closed.
icon = "\uf07b"  # nf-fa-folder: closed, contents not looked at
full = "\uf07b"  # nf-fa-folder: closed, known to hold something
empty = "\uf07c"  # nf-fa-folder_open: open, known empty
style = "bold blue"

[file]
icon = "\uf016"  # nf-fa-file_o: no more specific match
style = ""

